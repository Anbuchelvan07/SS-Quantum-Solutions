services:
  - type: web
    name: hr-consultancy-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        scope: build
        value: ${MONGO_URI}
      - key: JWT_SECRET
        scope: build
        value: ${JWT_SECRET}
      - key: ADMIN_EMAIL
        scope: build
        value: ${ADMIN_EMAIL}
      - key: ADMIN_PASSWORD
        scope: build
        value: ${ADMIN_PASSWORD}
      - key: ADMIN_NAME
        scope: build
        value: ${ADMIN_NAME}
      - key: RESEND_API_KEY
        scope: build
        value: ${RESEND_API_KEY}
      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app
      - key: PORT
        value: 5001

databases:
  - name: mongodb
    ipAllowed:
      - 0.0.0.0/0
